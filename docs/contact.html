<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Webflare Design Co.</title>
  <link rel="stylesheet" href="CSS/contact.css" />
  <link rel="icon" type="image/x-icon" href="Logos/logo.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
    (function(){
        emailjs.init({
            publicKey: "tAPyZLxsCqU_CP0H-",
        });
    })();
    </script>
</head>
<body>
  <div class="contact-section">
    <div class="header">
      <img src="Logos/logo.webp" alt="Webflare Design Co. Logo" class="logo"/>
      <h1>Contact Us</h1>
    </div>

    <h2>Get in Touch</h2>
    <div class="contact-container">
      <form class="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
        <h3>Send us a Message</h3>
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="email" placeholder="Your Email" required />
        <input type="tel" name="phone" placeholder="Your Phone Number">
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>

      <div class="contact-info">
        <h3>Contact Information</h3>
        <p><strong>Email:</strong> support@webflaredesignco.com</p>
        <p><strong>Phone:</strong> (315) 590-2863</p>
        <p><strong>Address:</strong> 807 Pickering Street, Ogdensburg, NY 13669</p>
        <p><strong>Hours:</strong> Sunday - Saturday: 8:00 AM - 5:00 PM</p>
        <a href="index.html" class="home-btn">Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function goBack() {
      // Check if there's a previous page in the history
      if (window.history.length > 1) {
        window.history.back();
      } else {
        // If no previous page, go to home page
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
