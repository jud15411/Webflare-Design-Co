<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Contact Us - Webflare Design Co.</title>
  <link rel="stylesheet" href="CSS/contact.css" />
  <link rel="icon" type="image/x-icon" href="Img/webflare-favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript"
        src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
  </script>
  <script type="text/javascript">
    (function(){
        emailjs.init({
            publicKey: "tAPyZLxsCqU_CP0H-",
        });
    })();
  </script>
</head>
<body>
  <div class="contact-section">
    <div class="header">
      <a href="index.html" class="logo-link">
        <img src="Logos/Webflare_Design_Co.webp" alt="Webflare Design Co. Logo" class="logo"/>
      </a>
      <h1>Contact Us</h1>
    </div>

    <div class="contact-container">
      <div class="contact-form-wrapper">
        <h2>Send us a Message</h2>
        <form action="https://formsubmit.co/judsonwells100@gmail.com" method="POST" class="contact-form">
          <input type="text" name="_honey" style="display:none">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="https://webflaredesignco.com/success.html">
          
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required />
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required />
          </div>
          
          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
          </div>
          
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Type your message here" required></textarea>
          </div>
          
          <button type="submit">Send Message</button>
        </form>
      </div>

      <div class="contact-info">
        <h2>Contact Information</h2>
        <div class="info-group">
          <h3>Email</h3>
          <a href="mailto:support@webflaredesignco.com" class="info-link">support@webflaredesignco.com</a>
        </div>
        
        <div class="info-group">
          <h3>Phone</h3>
          <a href="tel:+13155902863" class="info-link">(315) 590-2863</a>
        </div>
        
        <div class="info-group">
          <h3>Address</h3>
          <p>807 Pickering Street<br>Ogdensburg, NY 13669</p>
        </div>
        
        <div class="info-group">
          <h3>Business Hours</h3>
          <p>Sunday - Saturday<br>8:00 AM - 5:00 PM</p>
        </div>
        
        <a href="index.html" class="home-btn">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
