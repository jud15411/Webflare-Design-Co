<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Webflare Design Co.</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <img src="../images/logo.png" alt="Webflare Design Co. Logo" class="logo">
            <h1>Change Password Required</h1>
        </div>
        
        <form id="changePasswordForm" class="login-form">
            <div id="errorMessage" class="error-message"></div>
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" name="newPassword" required minlength="8">
                <p class="form-hint">Password must be at least 8 characters long</p>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Change Password</button>
        </form>
    </div>

    <script src="change-password.js"></script>
</body>
</html>
