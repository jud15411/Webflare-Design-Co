<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="admin-body">
    <!-- Navigation -->
    <div id="header"></div>
    <script>
        // Load header component
        fetch('components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
                // Initialize admin functionality
                Admin.init();
            });
    </script>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <div class="page-header">
            <div>
                <h1>Dashboard</h1>
                <p>Welcome to the Admin Dashboard</p>
            </div>
            <div class="header-actions">
                <button id="printReportBtn" class="btn btn-primary">
                    <i class="fas fa-print"></i>
                    Print Report
                </button>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Stats Cards -->
            <div class="stats-cards">
                <div class="stat-card">
                    <div class="stat-icon" style="background-color: rgba(37, 99, 235, 0.1);">
                        <i class="fas fa-chart-line" style="color: #2563eb;"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Total Revenue</h3>
                        <p id="totalRevenue">$0</p>
                        <small id="revenueChange">+0% from last month</small>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background-color: rgba(34, 197, 94, 0.1);">
                        <i class="fas fa-users" style="color: #22c55e;"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Active Customers</h3>
                        <p id="activeCustomers">0</p>
                        <small id="customerChange">+0 this month</small>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background-color: rgba(245, 158, 11, 0.1);">
                        <i class="fas fa-file-contract" style="color: #f59e0b;"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Active Projects</h3>
                        <p id="activeProjects">0</p>
                        <small id="projectChange">0 in progress</small>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background-color: rgba(239, 68, 68, 0.1);">
                        <i class="fas fa-file-invoice-dollar" style="color: #ef4444;"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Pending Invoices</h3>
                        <p id="pendingInvoices">$0</p>
                        <small id="invoiceChange">0 invoices pending</small>
                    </div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="dashboard-charts">
                <div class="chart-card">
                    <div class="card-header">
                        <h3>Revenue Overview</h3>
                        <div class="card-actions">
                            <select id="revenueTimeframe" class="select-sm">
                                <option value="week">This Week</option>
                                <option value="month">This Month</option>
                                <option value="year">This Year</option>
                            </select>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="revenueChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="card-header">
                        <h3>Project Status</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="projectChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="activity-section">
                <div class="card">
                    <div class="card-header">
                        <h3>Recent Activity</h3>
                        <button class="btn-text" id="refreshActivity">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <div class="activity-list" id="activityList">
                        <!-- Activity items will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions cfo-restricted">
                <div class="card">
                    <div class="card-header">
                        <h3>Quick Actions</h3>
                    </div>
                    <div class="actions-grid">
                        <button class="action-btn" onclick="location.href='customers.html#new'">
                            <i class="fas fa-user-plus"></i>
                            <span>New Customer</span>
                        </button>
                        <button class="action-btn" onclick="location.href='contracts.html#new'">
                            <i class="fas fa-file-signature"></i>
                            <span>New Contract</span>
                        </button>
                        <button class="action-btn" onclick="location.href='invoices.html#new'">
                            <i class="fas fa-file-invoice"></i>
                            <span>New Invoice</span>
                        </button>
                        <button class="action-btn" onclick="location.href='settings.html'">
                            <i class="fas fa-cog"></i>
                            <span>Settings</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Print Report Modal -->
    <div id="printModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Generate Report</h2>
            <form id="reportForm">
                <div class="form-group">
                    <label>Report Type</label>
                    <select id="reportType" name="reportType" required>
                        <option value="">Select Report Type</option>
                        <option value="customers">Customers</option>
                        <option value="contracts">Contracts</option>
                        <option value="invoices">Invoices</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate" name="startDate" required>
                </div>
                <div class="form-group">
                    <label>End Date</label>
                    <input type="date" id="endDate" name="endDate" required>
                </div>
                <button type="submit" class="btn btn-primary">Generate Report</button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Scripts -->
    <script src="js/admin.js"></script>
    <script>
        // Initialize admin functionality
        document.addEventListener('DOMContentLoaded', () => {
            Admin.init();
        });
    </script>
</body>
</html>
