<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Navigation -->
    <nav class="admin-nav">
        <div class="nav-brand">
            <img src="../Logos/Webflare_Design_Co.webp" alt="Webflare Design Co." class="nav-logo">
        </div>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="customers.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Customers</span>
            </a>
            <a href="contracts.html" class="nav-item">
                <i class="fas fa-file-contract"></i>
                <span>Contracts</span>
            </a>
            <a href="invoices.html" class="nav-item">
                <i class="fas fa-file-invoice-dollar"></i>
                <span>Invoices</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </div>
        <div class="nav-user">
            <div class="user-info">
                <span id="userAvatar" class="avatar"></span>
                <span id="userName" class="name"></span>
            </div>
            <button id="logoutBtn" class="btn-icon" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="content-header">
            <h1>Customers</h1>
            <button id="addCustomerBtn" class="btn-primary">
                <i class="fas fa-plus"></i>
                Add Customer
            </button>
        </div>

        <!-- Search and Filter -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchCustomer" placeholder="Search customers...">
            </div>
            <div class="filter-group">
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="active">Active</option>
                    <option value="inactive">Inactive</option>
                </select>
                <select id="sortBy">
                    <option value="name">Sort by Name</option>
                    <option value="date">Sort by Date</option>
                    <option value="status">Sort by Status</option>
                </select>
            </div>
        </div>

        <!-- Customers Table -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Company</th>
                        <th>Status</th>
                        <th>Projects</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody">
                    <!-- Table content will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <button id="prevPage" class="btn-icon" disabled>
                <i class="fas fa-chevron-left"></i>
            </button>
            <span id="pageInfo">Page 1 of 1</span>
            <button id="nextPage" class="btn-icon" disabled>
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </main>

    <!-- Add/Edit Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Customer</h2>
                <button class="close-modal">×</button>
            </div>
            <form id="customerForm">
                <div class="form-group">
                    <label for="customerName">Name</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label for="customerEmail">Email</label>
                    <input type="email" id="customerEmail" required>
                </div>
                <div class="form-group">
                    <label for="customerPhone">Phone</label>
                    <input type="tel" id="customerPhone" required>
                </div>
                <div class="form-group">
                    <label for="customerCompany">Company</label>
                    <input type="text" id="customerCompany">
                </div>
                <div class="form-group">
                    <label for="customerStatus">Status</label>
                    <select id="customerStatus" required>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="customerNotes">Notes</label>
                    <textarea id="customerNotes" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Customer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Delete Customer</h2>
                <button class="close-modal">×</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this customer? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" data-dismiss="modal">Cancel</button>
                <button id="confirmDelete" class="btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/admin.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
