<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customers - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/admin-mobile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/filter.js"></script>
    <script src="js/customers.js"></script>
</head>
<body class="admin-body">
    <!-- Navigation -->
    <div id="header"></div>
    <script>
        // Load header component
        fetch('components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
                // Initialize admin functionality
                Admin.init();
            });
    </script>

    <!-- Content Area -->
    <div class="admin-content">
        <main class="admin-main">
        <div class="content-header">
            <h1>Customers</h1>
            <button id="addCustomerBtn" class="btn-primary cfo-restricted">
                <i class="fas fa-plus"></i>
                Add Customer
            </button>
        </div>

        <!-- Search and Filter -->
        <div class="search-bar-container">
            <div class="search-box">
                <div class="search-icon">
                    <i class="fas fa-search"></i>
                </div>
                <input type="text" id="searchCustomer" placeholder="Search customers...">
            </div>
            <div class="filter-dropdown-container">
                <button class="filter-dropdown" onclick="toggleFilterMenu(this)">
                    <i class="fas fa-filter"></i>
                </button>
                <div class="filter-menu">
                    <button class="filter-close" onclick="closeFilterMenu(this)">
                        <i class="fas fa-times"></i>
                    </button>
                    <div class="filter-section">
                        <h4>Status</h4>
                        <div class="filter-checkbox">
                            <input type="checkbox" id="statusActive" value="active">
                            <label for="statusActive">Active</label>
                        </div>
                        <div class="filter-checkbox">
                            <input type="checkbox" id="statusInactive" value="inactive">
                            <label for="statusInactive">Inactive</label>
                        </div>
                    </div>
                    <div class="filter-section">
                        <h4>Sort By</h4>
                        <div class="date-range-filter">
                            <div class="date-range-header">
                                <button class="filter-header-button" onclick="toggleDateRange(this)">
                                    <span class="date-range-label">Date Range</span>
                                    <i class="fas fa-chevron-down"></i>
                                </button>
                            </div>
                            <div class="date-range-options">
                                <div class="date-range-item">
                                    <input type="radio" name="dateRange" id="dateRangeToday" value="today">
                                    <label for="dateRangeToday">Today</label>
                                </div>
                                <div class="date-range-item">
                                    <input type="radio" name="dateRange" id="dateRangeWeek" value="week">
                                    <label for="dateRangeWeek">This Week</label>
                                </div>
                                <div class="date-range-item">
                                    <input type="radio" name="dateRange" id="dateRangeMonth" value="month">
                                    <label for="dateRangeMonth">This Month</label>
                                </div>
                                <div class="date-range-item">
                                    <input type="radio" name="dateRange" id="dateRangeYear" value="year">
                                    <label for="dateRangeYear">This Year</label>
                                </div>
                                <div class="date-range-item">
                                    <input type="radio" name="dateRange" id="dateRangeCustom" value="custom">
                                    <label for="dateRangeCustom">Custom Range</label>
                                    <div class="custom-date-range">
                                        <input type="date" id="startDate">
                                        <span>to</span>
                                        <input type="date" id="endDate">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="customer-filter">
                            <div class="customer-header">
                                <button class="filter-header-button" onclick="toggleCustomerList(this)">
                                    <span class="customer-label">Customer Name</span>
                                    <i class="fas fa-chevron-down"></i>
                                </button>
                            </div>
                            <div class="customer-options">
                                <div class="customer-search">
                                    <input type="text" id="customerSearch" placeholder="Search customers...">
                                </div>
                                <div class="customer-list">
                                    <!-- Customer options will be populated by JavaScript -->
                                </div>
                            </div>
                        </div>
                        <div class="filter-actions">
                            <button class="filter-save" onclick="saveFilters()">
                                <i class="fas fa-save"></i>
                                Save Filters
                            </button>
                            <button class="filter-reset" onclick="resetFilters()">
                                <i class="fas fa-undo"></i>
                                Reset Filters
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Customers Table -->
        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Company</th>
                        <th data-filter="status">Status</th>
                        <th>Projects</th>
                        <th class="cfo-restricted">Actions</th>
                    </tr>
                </thead>
                <tbody id="customersTableBody">
                    <!-- Table content will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <button id="prevPage" class="btn-icon" disabled>
                <i class="fas fa-chevron-left"></i>
            </button>
            <span id="pageInfo">Page 1 of 1</span>
            <button id="nextPage" class="btn-icon" disabled>
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </main>

    <!-- Add/Edit Customer Modal -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Customer</h2>
                <button class="close-modal">×</button>
            </div>
            <form id="customerForm">
                <div class="form-group">
                    <label for="customerName">Name</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label for="customerEmail">Email</label>
                    <input type="email" id="customerEmail" required>
                </div>
                <div class="form-group">
                    <label for="customerPhone">Phone</label>
                    <input type="tel" id="customerPhone" required>
                </div>
                <div class="form-group">
                    <label for="customerCompany">Company</label>
                    <input type="text" id="customerCompany">
                </div>
                <div class="form-group">
                    <label for="customerStatus">Status</label>
                    <select id="customerStatus" required>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="customerNotes">Notes</label>
                    <textarea id="customerNotes" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Customer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Delete Customer</h2>
                <button class="close-modal">×</button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this customer? This action cannot be undone.</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" data-dismiss="modal">Cancel</button>
                <button id="confirmDelete" class="btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/admin.js"></script>
    <script src="js/customers.js"></script>
</body>
</html>
