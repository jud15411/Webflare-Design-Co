<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Webflare Design Co.</title>
    <link rel="icon" href="../../Img/webflare-favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
    <script>
        // Check if user is CEO
        function isCEO() {
            const userRole = localStorage.getItem('userRole');
            return userRole === 'CEO';
        }

        // Hide project management actions for non-CEO users
        function hideProjectActions() {
            // Hide new project button
            const newProjectBtn = document.querySelector('.new-project-btn');
            if (newProjectBtn) {
                newProjectBtn.style.display = isCEO() ? 'inline-block' : 'none';
            }
        }

        // View project details
        function viewProject(event) {
            event.preventDefault();
            const projectCard = event.target.closest('.project-card');
            if (!projectCard) return;

            // Remove any existing modal
            const existingModal = document.querySelector('.project-modal');
            if (existingModal) {
                existingModal.remove();
            }

            // Get project data
            const projectName = projectCard.querySelector('h2').textContent;
            const status = projectCard.querySelector('.bg-green-100').textContent;
            const customer = projectCard.querySelector('.text-gray-600').textContent;
            const contract = projectCard.querySelector('.text-gray-500').textContent;
            const progress = projectCard.querySelector('.bg-blue-600').style.width;
            const deadline = projectCard.querySelector('.text-gray-500:last-child').textContent;

            // Create and show project details modal
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center project-modal';
            modal.innerHTML = `
                <div class="bg-white rounded-lg shadow-xl p-6 max-w-2xl w-full">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold">Project Details</h3>
                        <button onclick="this.closest('div').remove()" class="text-gray-400 hover:text-gray-500">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <div class="text-xl font-medium text-gray-900">${projectName}</div>
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${
                                status === 'Active' ? 'bg-green-100 text-green-800' : 
                                status === 'Completed' ? 'bg-blue-100 text-blue-800' : 
                                'bg-yellow-100 text-yellow-800'
                            }">${status}</span>
                        </div>
                        <div class="space-y-2">
                            <p class="text-sm text-gray-600">Customer: ${customer}</p>
                            <p class="text-sm text-gray-600">Contract: ${contract}</p>
                        </div>
                        <div class="space-y-2">
                            <div class="flex items-center">
                                <span class="text-sm text-gray-600 mr-2">Progress:</span>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-blue-600 h-2 rounded-full" style="width: ${progress}"></div>
                                </div>
                            </div>
                            <p class="text-sm text-gray-600">Deadline: ${deadline}</p>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // Close modal when clicking outside
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // Edit project
        function editProject(event) {
            event.preventDefault();
            event.stopPropagation(); // Prevent the view modal from opening
            const projectCard = event.target.closest('.project-card');
            if (!projectCard) return;

            // Remove any existing modal
            const existingModal = document.querySelector('.project-modal');
            if (existingModal) {
                existingModal.remove();
            }

            // Get project data
            const projectName = projectCard.querySelector('h2').textContent;
            const status = projectCard.querySelector('.bg-green-100').textContent;
            const customer = projectCard.querySelector('.text-gray-600').textContent;
            const contract = projectCard.querySelector('.text-gray-500').textContent;
            const progress = projectCard.querySelector('.bg-blue-600').style.width;
            const deadline = projectCard.querySelector('.text-gray-500:last-child').textContent;

            // Create and show edit project modal
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center project-modal';
            modal.innerHTML = `
                <div class="bg-white rounded-lg shadow-xl p-6 max-w-2xl w-full">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold">Edit Project</h3>
                        <button onclick="this.closest('.project-modal').remove()" class="text-gray-400 hover:text-gray-500">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <form id="editProjectForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
                            <input type="text" name="projectName" value="${projectName}" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                            <select name="status" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="Active" ${status === 'Active' ? 'selected' : ''}>Active</option>
                                <option value="Completed" ${status === 'Completed' ? 'selected' : ''}>Completed</option>
                                <option value="On Hold" ${status === 'On Hold' ? 'selected' : ''}>On Hold</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Customer</label>
                            <select name="customer" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="${customer}" selected>${customer}</option>
                                <option value="Tech Solutions Inc.">Tech Solutions Inc.</option>
                                <option value="Digital Marketing Co.">Digital Marketing Co.</option>
                                <option value="E-commerce Store">E-commerce Store</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Contract</label>
                            <input type="text" name="contract" value="${contract.replace('Contract: ', '')}" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Progress</label>
                            <input type="range" name="progress" min="0" max="100" value="${progress.replace('%', '')}" class="w-full" oninput="this.nextElementSibling.value = this.value + '%'">
                            <output>${progress}</output>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Deadline</label>
                            <input type="date" name="deadline" value="${deadline}" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <button type="submit" class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600">
                                Update Project
                            </button>
                        </div>
                    </form>
                </div>
            `;
            document.body.appendChild(modal);

            // Handle form submission
            const form = modal.querySelector('#editProjectForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(form);

                // Update project card with new data
                projectCard.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-900">${formData.get('projectName')}</h2>
                        <div class="flex items-center space-x-2">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${
                                formData.get('status') === 'Active' ? 'bg-green-100 text-green-800' : 
                                formData.get('status') === 'Completed' ? 'bg-blue-100 text-blue-800' : 
                                'bg-yellow-100 text-yellow-800'
                            }">${formData.get('status')}</span>
                            <button onclick="editProject(event)" class="text-blue-600 hover:text-blue-900">
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <p class="text-sm text-gray-600">${formData.get('customer')}</p>
                        <p class="text-sm text-gray-500">Contract: ${formData.get('contract')}</p>
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <div>
                            <p class="font-medium text-gray-900">Progress</p>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${formData.get('progress')}%"></div>
                            </div>
                        </div>
                        <div>
                            <p class="font-medium text-gray-900">Deadline</p>
                            <p class="text-sm text-gray-500">${formData.get('deadline')}</p>
                        </div>
                    </div>
                `;

                // Show success message
                showSuccessModal('Project updated successfully!');

                // Close modal
                modal.remove();
            });

            // Close modal when clicking outside
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // Show success modal
        function showSuccessModal(message) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center project-modal';
            modal.innerHTML = `
                <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-lg font-semibold text-gray-900">Success</h3>
                        <button onclick="this.closest('.project-modal').remove()" class="text-gray-400 hover:text-gray-500">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="mb-6">
                        <p class="text-gray-600">${message}</p>
                    </div>
                    <div class="flex justify-end">
                        <button onclick="this.closest('.project-modal').remove()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">
                            OK
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            // Close modal when clicking outside
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.remove();
                }
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Add click event listeners for project cards
            const projectCards = document.querySelectorAll('.project-card');
            projectCards.forEach(card => {
                card.addEventListener('click', viewProject);
            });

            // Hide actions for non-CEO users
            hideProjectActions();

            // Hide Reports link for non-CEO users
            const reportsLink = document.querySelector('a[href="reports.html"]').parentElement;
            if (!isCEO()) {
                reportsLink.style.display = 'none';
            }

            // Update dashboard title based on role
            const dashboardTitle = document.getElementById('dashboardTitle');
            if (dashboardTitle) {
                const userRole = localStorage.getItem('userRole') || 'CFO';
                dashboardTitle.textContent = userRole === 'CEO' ? 'CEO Dashboard' : 'CFO Dashboard';
            }
        });
    </script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-lg">
            <div class="p-6">
                <img src="../../Logos/Webflare_Design_Co.webp" alt="Webflare Design Co." class="w-32 h-32 mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Admin Dashboard</h1>
            </div>
            
            <nav class="px-6">
                <ul class="space-y-1">
                    <li>
                        <a href="../components/dashboard.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-chart-line mr-3"></i>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="customers.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-users mr-3"></i>
                            Customers
                        </a>
                    </li>
                    <li>
                        <a href="contracts.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-file-contract mr-3"></i>
                            Contracts
                        </a>
                    </li>
                    <li>
                        <a href="invoices.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-file-invoice-dollar mr-3"></i>
                            Invoices
                        </a>
                    </li>
                    <li>
                        <a href="projects.html" class="flex items-center px-4 py-3 text-gray-700 bg-blue-50 text-blue-600 rounded-lg">
                            <i class="fas fa-project-diagram mr-3"></i>
                            Projects
                        </a>
                    </li>
                    <li>
                        <a href="reports.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-chart-bar mr-3"></i>
                            Reports
                        </a>
                    </li>
                    <li>
                        <a href="settings.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-cog mr-3"></i>
                            Settings
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="absolute bottom-0 left-0 w-full bg-white p-6">
                <div class="flex items-center space-x-4">
                    <div class="flex-1">
                        <p class="text-sm text-gray-600">Webflare Design Co.</p>
                        <p class="text-xs text-gray-500">&copy; 2025 All rights reserved</p>
                    </div>
                    <div class="flex space-x-4">
                        <a href="#" class="text-gray-600 hover:text-gray-800"><i class="fab fa-github"></i></a>
                        <a href="#" class="text-gray-600 hover:text-gray-800"><i class="fab fa-linkedin"></i></a>
                        <button onclick="logout()" class="text-red-600 hover:text-red-800">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <script>
                    function logout() {
                        // Clear all user data from localStorage
                        localStorage.removeItem('userRole');
                        localStorage.removeItem('username');
                        
                        // Redirect to login page
                        window.location.href = '../login.html';
                    }
                </script>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Header -->
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-6 py-4">
                    <h1 class="text-xl font-semibold text-gray-800">Projects</h1>
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <input type="text" placeholder="Search projects..." class="px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <i class="fas fa-search absolute right-3 top-2.5 text-gray-400"></i>
                        </div>
                        <button class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 new-project-btn">
                            <i class="fas fa-plus mr-2"></i>
                            New Project
                        </button>
                    </div>
                </div>
            </header>

            <!-- Projects Grid -->
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition-shadow project-card cursor-pointer hover:bg-gray-50">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold text-gray-900">E-commerce Website</h2>
                            <div class="flex items-center space-x-2">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                                    Active
                                </span>
                                <button onclick="editProject(event)" class="text-blue-600 hover:text-blue-900">
                                    <i class="fas fa-edit"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-4">
                            <p class="text-sm text-gray-600">Tech Solutions Inc.</p>
                            <p class="text-sm text-gray-500">Contract: CON-2025-001</p>
                        </div>
                        <div class="flex items-center justify-between text-sm">
                            <div>
                                <p class="font-medium text-gray-900">Progress</p>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-blue-600 h-2 rounded-full" style="width: 75%"></div>
                                </div>
                            </div>
                            <div>
                                <p class="font-medium text-gray-900">Deadline</p>
                                <p class="text-sm text-gray-500">2025-06-15</p>
                            </div>
                        </div>
                    </div>
                    <!-- Add more project cards as needed -->
                </div>
            </div>
        </main>
    </div>
</body>
</html>
