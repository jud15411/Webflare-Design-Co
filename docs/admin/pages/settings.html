<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Webflare Design Co.</title>
    <link rel="icon" href="../../Img/webflare-favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
    <script>
        // Check if user is CEO
        function isCEO() {
            const userRole = localStorage.getItem('userRole');
            return userRole === 'CEO';
        }

        // Disable editing for non-CEO users
        function disableEditing() {
            const inputs = document.querySelectorAll('.company-settings input, .company-settings select');
            inputs.forEach(input => {
                input.disabled = !isCEO();
            });
            
            const saveButton = document.querySelector('.company-settings button');
            if (saveButton) {
                saveButton.disabled = !isCEO();
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            // Set user role from login
            const userRole = localStorage.getItem('userRole') || 'CFO';
            const username = localStorage.getItem('username') || '';
            const email = localStorage.getItem('userEmail') || '';
            
            // Display current username and email
            document.getElementById('currentUsername').value = username;
            document.getElementById('currentEmail').value = email;
            
            disableEditing();

            // Company Settings Form Handler
            const companySettingsForm = document.getElementById('companySettingsForm');
            if (companySettingsForm) {
                companySettingsForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    if (!isCEO()) {
                        alert('Only the CEO can modify company settings');
                        return;
                    }

                    // Get all company settings values
                    const companySettings = {
                        name: document.getElementById('companyName').value,
                        email: document.getElementById('companyEmail').value,
                        address: document.getElementById('companyAddress').value,
                        phone: document.getElementById('companyPhone').value,
                        website: document.getElementById('companyWebsite').value,
                        taxId: document.getElementById('companyTaxId').value,
                        taxRate: document.getElementById('companyTaxRate').value
                    };

                    // Save to localStorage (in a real app, this would be saved to a database)
                    localStorage.setItem('companySettings', JSON.stringify(companySettings));
                    alert('Company settings saved successfully');
                });
            }

            // General Settings Form Handler
            const generalSettingsForm = document.getElementById('generalSettingsForm');
            if (generalSettingsForm) {
                generalSettingsForm.addEventListener('submit', (e) => {
                    e.preventDefault();

                    // Get all general settings values
                    const generalSettings = {
                        timeZone: document.getElementById('timeZone').value,
                        defaultCurrency: document.getElementById('defaultCurrency').value,
                        invoicePrefix: document.getElementById('invoicePrefix').value
                    };

                    // Save to localStorage (in a real app, this would be saved to a database)
                    localStorage.setItem('generalSettings', JSON.stringify(generalSettings));
                    alert('General settings saved successfully');
                });
            }

            // User Settings Form Handler
            const userSettingsForm = document.getElementById('userSettingsForm');
            if (userSettingsForm) {
                userSettingsForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const newPassword = document.getElementById('newPassword').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    const newUsername = document.getElementById('newUsername').value;
                    const newEmail = document.getElementById('newEmail').value;
                    const currentPassword = document.getElementById('currentPassword').value;

                    // Validate passwords match if changing password
                    if (newPassword && newPassword !== confirmPassword) {
                        alert('New passwords do not match');
                        return;
                    }

                    // Validate current password
                    const userRole = localStorage.getItem('userRole');
                    const storedUsers = JSON.parse(localStorage.getItem('users') || '{}');
                    const defaultPassword = userRole === 'CEO' ? 'ceo123' : 'cfo123';
                    const storedPassword = storedUsers[username]?.password || defaultPassword;

                    if (currentPassword !== defaultPassword && currentPassword !== storedPassword) {
                        alert('Current password is incorrect');
                        return;
                    }

                    // Update username if provided
                    if (newUsername) {
                        localStorage.setItem('username', newUsername);
                        document.getElementById('currentUsername').value = newUsername;
                    }

                    // Update email if provided
                    if (newEmail) {
                        localStorage.setItem('userEmail', newEmail);
                        document.getElementById('currentEmail').value = newEmail;
                    }

                    // Update password if provided
                    if (newPassword) {
                        // Store the new password in localStorage
                        localStorage.setItem('userPassword', newPassword);
                    }

                    // Store the updated credentials in the users object
                    const username = localStorage.getItem('username');
                    const email = localStorage.getItem('userEmail');
                    const password = localStorage.getItem('userPassword') || (userRole === 'CEO' ? 'ceo123' : 'cfo123');

                    // Update the users object in localStorage
                    const users = JSON.parse(localStorage.getItem('users') || '{}');
                    users[username] = {
                        password: password,
                        role: userRole,
                        email: email
                    };
                    localStorage.setItem('users', JSON.stringify(users));

                    // Clear form fields
                    document.getElementById('newUsername').value = '';
                    document.getElementById('newEmail').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    document.getElementById('currentPassword').value = '';

                    alert('User settings saved successfully');
                });
            }

            // Load saved settings if they exist
            const savedCompanySettings = localStorage.getItem('companySettings');
            if (savedCompanySettings) {
                const settings = JSON.parse(savedCompanySettings);
                Object.keys(settings).forEach(key => {
                    const element = document.getElementById(`company${key.charAt(0).toUpperCase() + key.slice(1)}`);
                    if (element) element.value = settings[key];
                });
            }

            const savedGeneralSettings = localStorage.getItem('generalSettings');
            if (savedGeneralSettings) {
                const settings = JSON.parse(savedGeneralSettings);
                Object.keys(settings).forEach(key => {
                    const element = document.getElementById(key);
                    if (element) element.value = settings[key];
                });
            }
        });
    </script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-lg flex flex-col">

                <h1 class="text-2xl font-bold text-gray-800">Admin Dashboard</h1>
            </div>
            
            <nav class="px-6 flex-grow">
                <ul class="space-y-1">
                    <li>
                        <a href="../components/dashboard.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">

                        </a>
                    </li>
                    <li>
                        <a href="customers.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">

                            Customers
                        </a>
                    </li>
                    <li>
                        <a href="contracts.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-file-contract mr-3"></i>

                    </li>
                    <li>

                    </li>
                    <li>
                        <a href="projects.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-project-diagram mr-3"></i>
                            Projects
                        </a>
                    </li>
                    <li>
                        <a href="reports.html" class="flex items-center px-4 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 rounded-lg">
                            <i class="fas fa-chart-bar mr-3"></i>
                            Reports
                        </a>
                    </li>
                    <li>
                        <a href="settings.html" class="flex items-center px-4 py-3 text-gray-700 bg-blue-50 text-blue-600 rounded-lg">
                            <i class="fas fa-cog mr-3"></i>
                            Settings
                        </a>
                    </li>
                </ul>
            </nav>
            
            <div class="p-6 border-t border-gray-200">
                <div class="flex items-center space-x-4">
                    <div class="flex-1">
                        <p class="text-sm text-gray-600">Webflare Design Co.</p>
                        <p class="text-xs text-gray-500">&copy; 2025 All rights reserved</p>
                    </div>
                    <div class="flex space-x-4">
                        <a href="#" class="text-gray-600 hover:text-gray-800"><i class="fab fa-github"></i></a>
                        <a href="#" class="text-gray-600 hover:text-gray-800"><i class="fab fa-linkedin"></i></a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto">
            <!-- Header -->
            <header class="bg-white shadow-sm">
                <div class="flex items-center justify-between px-6 py-4">
                    <h1 class="text-xl font-semibold text-gray-800">Settings</h1>
                </div>
            </header>

            <!-- Settings Content -->
            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Company Settings -->
                    <div class="bg-white rounded-lg shadow p-6 company-settings">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">Company Settings</h2>
                        <p class="text-sm text-gray-600 mb-4">These settings can only be edited by the CEO</p>
                        <form id="companySettingsForm">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Name</label>
                                    <input type="text" id="companyName" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="Webflare Design Co.">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Email</label>
                                    <input type="email" id="companyEmail" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="info@webflaredesignco.com">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Address</label>
                                    <input type="text" id="companyAddress" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="123 Business Street, Tech City">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                                    <input type="tel" id="companyPhone" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="+1 (555) 123-4567">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Company Website</label>
                                    <input type="url" id="companyWebsite" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="https://webflaredesignco.com">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Tax ID</label>
                                    <input type="text" id="companyTaxId" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="123-45-6789">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Tax Rate (%)</label>
                                    <input type="number" id="companyTaxRate" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="8.75">
                                </div>
                                <div>
                                    <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                                        Save Company Settings
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- General Settings -->
                    <div class="bg-white rounded-lg shadow p-6">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">General Settings</h2>
                        <form id="generalSettingsForm">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Time Zone</label>
                                    <select id="timeZone" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="EST">Eastern Standard Time (EST)</option>
                                        <option value="CST">Central Standard Time (CST)</option>
                                        <option value="MST">Mountain Standard Time (MST)</option>
                                        <option value="PST">Pacific Standard Time (PST)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Default Currency</label>
                                    <select id="defaultCurrency" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                        <option value="USD">US Dollar (USD)</option>
                                        <option value="EUR">Euro (EUR)</option>
                                        <option value="GBP">British Pound (GBP)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Invoice Prefix</label>
                                    <input type="text" id="invoicePrefix" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="INV-">
                                </div>
                                <div>
                                    <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                                        Save General Settings
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- User Settings -->
                    <div class="bg-white rounded-lg shadow p-6">
                        <h2 class="text-lg font-semibold text-gray-900 mb-4">User Settings</h2>
                        <form id="userSettingsForm">
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Username</label>
                                    <input type="text" id="currentUsername" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" readonly>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Email</label>
                                    <input type="email" id="currentEmail" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" readonly>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">New Username</label>
                                    <input type="text" id="newUsername" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">New Email</label>
                                    <input type="email" id="newEmail" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
                                    <input type="password" id="currentPassword" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
                                    <input type="password" id="newPassword" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
                                    <input type="password" id="confirmPassword" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <button type="submit" class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                                        Save User Settings
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
