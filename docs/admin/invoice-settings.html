<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Settings - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/settings.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Navigation -->
    <div id="header"></div>
    <script>
        // Load header component
        fetch('components/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
                // Initialize admin functionality
                Admin.init();
            });
    </script>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="content-header">
            <h1>Invoice Settings</h1>
        </div>

        <!-- Invoice Settings Section -->
        <div class="settings-container">
            <section class="settings-section">
                <form id="invoiceSettingsForm" class="settings-form">
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="invoicePrefix">Invoice Prefix</label>
                            <input type="text" id="invoicePrefix" name="invoicePrefix" placeholder="INV-" autocomplete="off">
                        </div>
                        <div class="form-group col-md-6">
                            <label for="invoiceNumber">Next Invoice Number</label>
                            <input type="number" id="invoiceNumber" name="invoiceNumber" min="1" autocomplete="off">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="invoiceCurrency">Currency</label>
                            <select id="invoiceCurrency" name="invoiceCurrency" autocomplete="off">
                                <option value="USD">USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                            </select>
                        </div>
                        <div class="form-group col-md-6">
                            <label for="invoiceTaxRate">Default Tax Rate (%)</label>
                            <input type="number" id="invoiceTaxRate" name="invoiceTaxRate" min="0" step="0.1" autocomplete="off">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="invoiceFooter">Invoice Footer</label>
                        <textarea id="invoiceFooter" name="invoiceFooter" rows="3" placeholder="Enter invoice footer text..." autocomplete="off"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="invoiceTemplate">Invoice Template</label>
                        <select id="invoiceTemplate" name="invoiceTemplate" autocomplete="off">
                            <option value="default">Default Template</option>
                            <option value="modern">Modern Template</option>
                            <option value="professional">Professional Template</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="invoiceLogo">Invoice Logo</label>
                        <div class="logo-upload">
                            <img id="logoPreview" src="" alt="Invoice Logo" class="logo-preview">
                            <input type="file" id="companyLogo" name="companyLogo" accept="image/*" style="display: none">
                            <button type="button" id="uploadLogoBtn" class="btn btn-secondary">
                                <i class="fas fa-upload"></i>
                                Upload Logo
                            </button>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Invoice Settings</button>
                    </div>
                </form>
            </section>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/admin.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
