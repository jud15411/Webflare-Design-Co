<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-brand">
            <img src="../Logos/Webflare_Design_Co.webp" alt="Webflare Design Co Logo">
        </a>
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
        <ul class="nav-menu" id="navMenu">
            <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
            <li><a href="customers.html" class="nav-link">Customers</a></li>
            <li><a href="contracts.html" class="nav-link">Contracts</a></li>
            <li><a href="invoices.html" class="nav-link active">Invoices</a></li>
        </ul>
        <div class="user-menu">
            <a href="settings.html" class="settings-btn" title="Settings">
                <i class="fas fa-cog"></i>
            </a>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <span id="userName">Admin</span>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <div class="content-header">
            <h1>Invoices</h1>
            <button class="btn btn-primary" id="addInvoiceBtn">
                <i class="fas fa-plus"></i> Add New Invoice
            </button>
        </div>

        <div class="invoices-container">
            <div class="invoices-list" id="invoicesList">
                <!-- Invoices will be loaded here -->
            </div>
        </div>
    </main>

    <div class="modal" id="invoiceModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Invoice</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="addInvoiceForm">
                <div class="form-group">
                    <label for="customerId">Customer</label>
                    <select id="customerId" name="customerId" required>
                        <option value="">Select Customer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="contractId">Related Contract</label>
                    <select id="contractId" name="contractId">
                        <option value="">Select Contract (Optional)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Invoice Date</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate" name="dueDate" required>
                </div>
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" name="amount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="pending">Pending</option>
                        <option value="paid">Paid</option>
                        <option value="overdue">Overdue</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="4" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelInvoice">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="submitInvoice">Add Invoice</button>
                </div>
            </form>
        </div>
    </div>

    <script src="invoices.js"></script>
</body>
</html>
