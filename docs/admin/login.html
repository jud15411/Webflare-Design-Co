<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="../Logos/Webflare_Design_Co.webp" alt="Webflare Design Co." class="login-logo">
                <h1>Admin Login</h1>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i>
                        Username
                    </label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <button type="submit" class="login-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </button>
                </div>
            </form>
            <div id="loginError" class="login-error"></div>
        </div>
        <div class="login-footer">
            <p>&copy; 2025 Webflare Design Co. All rights reserved.</p>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/login.js"></script>
    <script>
        // Initialize login functionality
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // Initialize login module
                AdminLogin.init();
                
                // Check for existing token
                const token = localStorage.getItem('adminToken');
                if (token) {
                    // Clear token and redirect to login
                    localStorage.removeItem('adminToken');
                    localStorage.removeItem('adminUser');
                }
            } catch (error) {
                console.error('Error initializing login:', error);
            }
        });
    </script>
</body>
</html>
