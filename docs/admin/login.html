<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .auth-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        /* Add styles for select options */
        select.form-control option {
            background-color: #1a1a2e;
            color: white;
        }
        select.form-control:focus option {
            background-color: #16213e;
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2);
            position: relative;
            overflow: hidden;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(49, 130, 206, 0.3);
            background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%);
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            text-align: center;
            padding: 0.5rem;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 0.5rem;
            display: none;
        }
        .forgot-password {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
        }
        .forgot-password a {
            color: #3182ce;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .forgot-password a:hover {
            color: #63b3ed;
            text-decoration: underline;
        }
        .security-note {
            margin-top: 2rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .security-note i {
            color: #3182ce;
        }
        .password-strength {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
        }
        .strength-weak { background: #ff6b6b; width: 33.33%; }
        .strength-medium { background: #ffd93d; width: 66.66%; }
        .strength-strong { background: #51cf66; width: 100%; }
        .login-attempts {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            margin-top: 1rem;
        }
        .two-factor-section {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .qr-code {
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem auto;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../Logos/Webflare_Design_Co.webp" alt="Webflare Design Co." class="w-32 h-32 mx-auto mb-4">
                <h1>Admin Login</h1>
                <p>Secure access to your business management portal</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div class="form-group">
                    <label for="role" class="block text-sm font-medium text-gray-300 mb-1">Role</label>
                    <select id="role" class="form-control" required>
                        <option value="">Select your role</option>
                        <option value="CEO">CEO</option>
                        <option value="CFO">CFO</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="form-control" placeholder="Enter your email"
                           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$">
                </div>

                <div class="form-group">
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required 
                               class="form-control" placeholder="Enter your password">
                        <i class="fas fa-eye absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 cursor-pointer" 
                           onclick="togglePasswordVisibility()"></i>
                    </div>
                    <div class="password-strength">
                        <div class="password-strength-bar"></div>
                    </div>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-primary">
                        <span class="button-text">Sign In</span>
                        <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </div>

                <div class="error-message" id="errorMessage"></div>
                <div class="login-attempts" id="loginAttempts"></div>
            </form>

            <div class="forgot-password">
                <a href="#" onclick="showPasswordReset()">Forgot your password?</a>
            </div>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                <span>Protected by advanced security measures</span>
            </div>
        </div>
    </div>

    <script>
        // Enhanced security features
        const MAX_LOGIN_ATTEMPTS = 5;
        const LOCKOUT_DURATION = 15 * 60 * 1000; // 15 minutes in milliseconds
        let loginAttempts = 0;
        let lockoutEndTime = 0;

        // Password strength checker
        function checkPasswordStrength(password) {
            const strengthBar = document.querySelector('.password-strength-bar');
            let strength = 0;
            
            if (password.length >= 8) strength += 1;
            if (password.match(/[a-z]+/)) strength += 1;
            if (password.match(/[A-Z]+/)) strength += 1;
            if (password.match(/[0-9]+/)) strength += 1;
            if (password.match(/[^a-zA-Z0-9]+/)) strength += 1;

            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.querySelector('.fa-eye');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        function showPasswordReset() {
            // Implement password reset functionality
            alert('Password reset functionality will be implemented here.');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('errorMessage');
            const loginAttemptsDisplay = document.getElementById('loginAttempts');

            // Initialize default credentials if none exist
            if (!localStorage.getItem('userCredentials')) {
                const defaultCredentials = [
                    {
                        role: 'CEO',
                        email: 'ceo@webflaredesignco.com',
                        password: 'ceo123',
                        name: 'CEO'
                    },
                    {
                        role: 'CFO',
                        email: 'cfo@webflaredesignco.com',
                        password: 'cfo123',
                        name: 'CFO'
                    }
                ];
                localStorage.setItem('userCredentials', JSON.stringify(defaultCredentials));
            }

            // Check for existing lockout
            const storedLockoutEnd = localStorage.getItem('lockoutEndTime');
            if (storedLockoutEnd) {
                lockoutEndTime = parseInt(storedLockoutEnd);
                if (Date.now() < lockoutEndTime) {
                    const remainingTime = Math.ceil((lockoutEndTime - Date.now()) / 1000 / 60);
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = `Account locked. Please try again in ${remainingTime} minutes.`;
                    form.querySelector('button[type="submit"]').disabled = true;
                } else {
                    localStorage.removeItem('lockoutEndTime');
                    localStorage.removeItem('loginAttempts');
                }
            }

            // Password strength checker
            passwordInput.addEventListener('input', (e) => {
                checkPasswordStrength(e.target.value);
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                
                if (Date.now() < lockoutEndTime) {
                    return;
                }

                const role = document.getElementById('role').value;
                const email = document.getElementById('email').value;
                const password = passwordInput.value;

                errorMessage.style.display = 'none';
                loginAttemptsDisplay.textContent = '';

                if (!role) {
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = 'Please select your role';
                    return;
                }

                try {
                    // Get stored credentials
                    const storedCredentials = JSON.parse(localStorage.getItem('userCredentials') || '[]');
                    const user = storedCredentials.find(cred => 
                        cred.role === role && 
                        cred.email === email && 
                        cred.password === password
                    );

                    if (!user) {
                        throw new Error('Invalid credentials');
                    }

                    // Successful login
                    loginAttempts = 0;
                    localStorage.removeItem('loginAttempts');
                    localStorage.removeItem('lockoutEndTime');

                    // Store user session
                    const sessionData = {
                        role: user.role,
                        email: user.email,
                        name: user.name,
                        loginTime: Date.now()
                    };
                    localStorage.setItem('userSession', JSON.stringify(sessionData));

                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';

                } catch (error) {
                    loginAttempts++;
                    localStorage.setItem('loginAttempts', loginAttempts.toString());
                    
                    if (loginAttempts >= MAX_LOGIN_ATTEMPTS) {
                        lockoutEndTime = Date.now() + LOCKOUT_DURATION;
                        localStorage.setItem('lockoutEndTime', lockoutEndTime.toString());
                        errorMessage.style.display = 'block';
                        errorMessage.textContent = `Too many failed attempts. Account locked for 15 minutes.`;
                        form.querySelector('button[type="submit"]').disabled = true;
                    } else {
                        errorMessage.style.display = 'block';
                        errorMessage.textContent = error.message;
                        loginAttemptsDisplay.textContent = `${MAX_LOGIN_ATTEMPTS - loginAttempts} attempts remaining`;
                    }
                }
            });
        });
    </script>
</body>
</html>
