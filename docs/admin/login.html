<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webflare Design Co. - Secure Admin Access</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.3/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        .auth-container {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .auth-header h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .auth-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-control {
            width: 100%;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        .form-control:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1);
            outline: none;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3182ce 0%, #2c5282 100%);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(49, 130, 206, 0.3);
            background: linear-gradient(135deg, #2c5282 0%, #1a365d 100%);
        }
        .error-message {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            text-align: center;
            padding: 0.5rem;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 0.5rem;
        }
        .forgot-password {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
        }
        .forgot-password a {
            color: #3182ce;
            text-decoration: none;
            font-weight: 600;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .security-note {
            margin-top: 2rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }
        .security-note i {
            color: #3182ce;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../Logos/Webflare_Design_Co.webp" alt="Webflare Design Co." class="w-32 h-32 mx-auto mb-4">
                <h1>Secure Admin Access</h1>
                <p>Enter your credentials to access the business management portal</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div class="form-group">
                    <label for="role" class="block text-sm font-medium text-gray-300 mb-1">Role</label>
                    <select id="role" class="form-control" required>
                        <option value="">Select your role</option>
                        <option value="CEO">CEO</option>
                        <option value="CFO">CFO</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
                    <input type="email" id="email" name="email" required 
                           class="form-control" placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required 
                               class="form-control" placeholder="Enter your password">
                        <i class="fas fa-eye absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 cursor-pointer" 
                           onclick="togglePasswordVisibility()"></i>
                    </div>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-primary">Sign In <i class="fas fa-arrow-right ml-2"></i></button>
                </div>

                <div class="error-message" id="errorMessage"></div>
            </form>

            <div class="forgot-password">
                <a href="#">Forgot your password?</a>
            </div>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                <span>Secure login with encrypted connection</span>
            </div>
        </div>
    </div>

    <script>
        // Simulated user credentials
        const defaultUsers = {
            'CEO': { 
                password: 'ceo123', 
                email: 'ceo@webflaredesignco.com',
                permissions: {
                    canManageProjects: true,
                    canViewReports: true,
                    canManageUsers: true,
                    canManageContracts: true,
                    canManageInvoices: true,
                    canManageCustomers: true,
                    canViewFinancials: true
                }
            },
            'CFO': { 
                password: 'cfo123', 
                email: 'cfo@webflaredesignco.com',
                permissions: {
                    canManageProjects: false,
                    canViewReports: true,
                    canManageUsers: false,
                    canManageContracts: true,
                    canManageInvoices: true,
                    canManageCustomers: true,
                    canViewFinancials: true
                }
            }
        };

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.querySelector('.fa-eye');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.querySelector('form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const role = document.querySelector('#role').value;
                const email = document.querySelector('#email').value;
                const password = document.querySelector('#password').value;
                const errorMessage = document.getElementById('errorMessage');

                errorMessage.textContent = '';

                if (!role) {
                    errorMessage.textContent = 'Please select your role';
                    return;
                }

                try {
                    const storedUsers = JSON.parse(localStorage.getItem('users') || '{}');
                    const users = Object.keys(storedUsers).length > 0 ? storedUsers : defaultUsers;
                    const user = users[role];

                    if (!user) {
                        throw new Error('Invalid role');
                    }

                    if (user.password !== password) {
                        throw new Error('Invalid password');
                    }

                    if (user.email !== email) {
                        throw new Error('Invalid email');
                    }

                    localStorage.setItem('userRole', role);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userPermissions', JSON.stringify(user.permissions));
                    
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    errorMessage.textContent = error.message;
                }
            });
        });
    </script>
</body>
</html>
