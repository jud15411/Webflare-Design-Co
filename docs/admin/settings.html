<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Webflare Design Co.</title>
    <link rel="icon" href="../Img/webflare-favicon.png">
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <a href="dashboard.html" class="nav-brand">
            <img src="../Logos/Webflare_Design_Co.webp" alt="Webflare Design Co Logo">
        </a>
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
        <ul class="nav-menu" id="navMenu">
            <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
            <li><a href="customers.html" class="nav-link">Customers</a></li>
            <li><a href="contracts.html" class="nav-link">Contracts</a></li>
            <li><a href="invoices.html" class="nav-link">Invoices</a></li>
            <li><a href="settings.html" class="nav-link active">Settings</a></li>
        </ul>
        <div class="user-menu">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <span id="userName">Admin</span>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </nav>

    <div class="menu-overlay" id="menuOverlay"></div>

    <main class="main-content">
        <div class="content-header">
            <h1>Settings</h1>
        </div>

        <div class="content-body">
            <div class="settings-container">
                <div class="settings-section">
                    <h2>Company Settings</h2>
                    <form id="settingsForm">
                        <div class="form-group">
                            <label for="companyName">Company Name</label>
                            <input type="text" id="companyName" name="companyName" required>
                        </div>
                        <div class="form-group">
                            <label for="companyEmail">Company Email</label>
                            <input type="email" id="companyEmail" name="companyEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="companyPhone">Company Phone</label>
                            <input type="tel" id="companyPhone" name="companyPhone">
                        </div>
                        <div class="form-group">
                            <label for="companyAddress">Company Address</label>
                            <textarea id="companyAddress" name="companyAddress"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="invoicePrefix">Invoice Prefix</label>
                            <input type="text" id="invoicePrefix" name="invoicePrefix" required>
                        </div>
                        <div class="form-group">
                            <label for="contractPrefix">Contract Prefix</label>
                            <input type="text" id="contractPrefix" name="contractPrefix" required>
                        </div>
                        <div class="form-group">
                            <label for="taxRate">Tax Rate (%)</label>
                            <input type="number" id="taxRate" name="taxRate" min="0" max="100" step="0.01">
                        </div>
                        <div class="form-group">
                            <label for="currency">Currency</label>
                            <select id="currency" name="currency" required>
                                <option value="USD">USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                                <option value="CAD">CAD ($)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="dateFormat">Date Format</label>
                            <select id="dateFormat" name="dateFormat" required>
                                <option value="MM/DD/YYYY">MM/DD/YYYY</option>
                                <option value="DD/MM/YYYY">DD/MM/YYYY</option>
                                <option value="YYYY-MM-DD">YYYY-MM-DD</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="timeFormat">Time Format</label>
                            <select id="timeFormat" name="timeFormat" required>
                                <option value="12h">12-hour</option>
                                <option value="24h">24-hour</option>
                            </select>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Settings</button>
                        </div>
                    </form>
                </div>

                <div class="settings-section">
                    <h2>Change Password</h2>
                    <form id="passwordForm">
                        <div id="errorMessage" class="error-message"></div>
                        <div class="form-group">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" name="currentPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Update Password</button>
                        </div>
                    </form>
                </div>

                <div class="settings-section">
                    <h2>Admin Users</h2>
                    <div class="admin-users-list" id="adminUsersList">
                        <!-- Admin users will be loaded here -->
                    </div>
                    <button class="btn btn-primary" id="addAdminBtn">Add New Admin</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Admin Modal -->
    <div class="modal" id="addAdminModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Add New Admin</h2>
            <form id="addAdminForm">
                <div class="form-group">
                    <label for="adminName">Name</label>
                    <input type="text" id="adminName" required>
                </div>
                <div class="form-group">
                    <label for="adminEmail">Email</label>
                    <input type="email" id="adminEmail" required>
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" required>
                </div>
                <div class="form-group">
                    <label for="adminRole">Role</label>
                    <select id="adminRole" required>
                        <option value="admin">Admin</option>
                        <option value="editor">Editor</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Admin</button>
            </form>
        </div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
