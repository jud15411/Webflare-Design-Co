<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webflare Admin - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="../Logos/Webflare_Design_Co.webp" alt="Webflare Logo" class="logo"> <!-- Assuming logo path -->
                <h2>Admin Panel Login</h2>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" name="role" required>
                        <option value="">Select your role</option>
                        <option value="CEO">CEO</option>
                        <option value="CFO">CFO</option>
                    </select>
                </div>
                <div class="form-group" id="newPasswordGroup" style="display:none;">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="newPassword">
                    <p class="info-text">A new password is required for your first login.</p>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <div class="login-footer">
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            </div>
        </div>
    </div>

    <!-- AWS SDK for JavaScript (Cognito Identity) -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1093.0.min.js"></script> 
    <!-- Note: Consider using modular SDK imports for production -->

    <!-- AWS SDK for JavaScript (Cognito Identity) -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1093.0.min.js"></script>
    
    <!-- API Client -->
    <script src="js/api-client.js"></script>
    
    <!-- Configuration -->
    <script src="js/config.js"></script>
    
    <!-- Core Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
