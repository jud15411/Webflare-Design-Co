services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - ./.env
    depends_on:
      - redis


  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - '6379:6379'

  client: 
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      - server

  client-portal: 
    build:
      context: .
      dockerfile: Dockerfile.portal 
    ports: # ⬅️ Add a unique port for debugging/access (optional, but good practice)
      - '5174:5174'
    depends_on:
      - server

  public-website: 
    build:
      context: .
      dockerfile: Dockerfile.public-website
    depends_on:
      - server

  nginx:
    image: nginx:stable-alpine
    container_name: reverse_proxy
    ports:
      - '5000:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server
      - client-portal
      - public-website 