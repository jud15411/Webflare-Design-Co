map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Upstreams using container names and internal ports
upstream backend_service { server server:5001; }          
upstream admin_panel_service { server client:5173; }      
upstream public_website_service { server public-website:5173; } 
upstream client_portal_service { server client-portal:5174; }

server {
    listen 80;

    resolver 127.0.0.11; # Docker internal DNS

    # API - No restriction applied here, as it's assumed to be accessed via the frontends
    location /api/ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, PATCH, POST, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 1728000;
            
            return 204;
        }
        
        proxy_pass http://backend_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Admin Panel (Permanently Restricted)
    location /firmaplex-admin-panel/ {
        # --- IP Whitelisting Rules ---
        # allow YOUR.ALLOWED.IP.ADDRESS/32;   # Allow a single static IP
        allow 69.80.176.0/24;     # Allow an IP range (e.g., an office network)
        deny all;                           # Explicitly block all other IPs
        # -----------------------------
        
        proxy_pass http://admin_panel_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Client Portal (Temporarily Restricted)
    location /client-portal/ {
        # --- IP Whitelisting Rules (REMOVE THESE LINES FOR PUBLIC RELEASE) ---
        # allow YOUR.ALLOWED.IP.ADDRESS/32; # Allow a single static IP
        allow 69.80.176.0/24;   
        deny all;                           # Explicitly block all other IPs
        # -------------------------------------------------------------------
        
        proxy_pass http://client_portal_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public Website (Temporarily Restricted)
    location / {
        # --- IP Whitelisting Rules (REMOVE THESE LINES FOR PUBLIC RELEASE) ---
        # allow YOUR.ALLOWED.IP.ADDRESS/32;   # Allow a single static IP
        allow 69.80.176.0/24;
        deny all;                           # Explicitly block all other IPs
        # -------------------------------------------------------------------
        
        proxy_pass http://public_website_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}